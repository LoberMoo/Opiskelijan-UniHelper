<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/css/homepage.css">
  <link rel="stylesheet" href="src/css/palaute.css">
  <title>UniHelper</title>
</head>
<body>
  <nav>
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('auki')">☰</button>
    <span style="color:white; font-weight:bold">UniHelper</span>
    <span class="kayttajatunnus">Hei <span class="username"></span>!</span>
  </nav>

  <div class="sidebar" id="sidebar" style="z-index: 2;">
    <ul>
      <li><a href="homepage.html">Koti</a></li>
      <li><a href="PSQI.html">PSQI-Kysely</a></li>
      <li><a href="BMI.html">Painoindeksi</a></li>
      <li><a href="paivakirja.html">Päiväkirja</a></li>
      <li><a href="historia.html">Historia</a></li>
      <li><a href="palaute.html">Palaute</a></li>
    </ul>
  </div>

  <div class="lomake">
    <div class="ylärivi">
      <input type="email" placeholder="Sähköpostisi">
      <label class="tiedosto-nappi"> + Lisää tiedosto<input type="file" style="display:none"></label>
    </div>
    <input type="text" placeholder="Aihe">
    <textarea placeholder="Kuvaus"></textarea>
    <div style="text-align:right">
      <button onclick="laheta()">Lähetä</button>
    </div>
  </div>

  <div class="popup" id="popup" style="display:none">
    <p>Palautteesi on vastaanotettu.</p>
    <button onclick="sulje()">Sulje</button>
  </div>

<script>
  function laheta() {
    document.getElementById('popup').style.display = 'block'
  }
  function sulje() {
    document.getElementById('popup').style.display = 'none'
    location.reload()
  }
</script>
</body>
</html>
