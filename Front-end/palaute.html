<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/css/homepage.css">
  <link rel="stylesheet" href="src/css/palaute.css">
  <title>UniHelper</title>
</head>
<body>
  <nav>
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('auki')">☰</button>
    <span style="color:white; font-weight:bold">UniHelper</span>
    <span class="kayttajatunnus">Hei <span class="username"></span>!</span>
  </nav>

  <div class="sidebar" id="sidebar">
      <ul>
        <li><a href="homepage.html">Koti</a></li>
        <li><a href="PSQI.html">PSQI-kysely</a></li>
        <li><a href="BMI.html">Painoindeksi</a></li>
        <li><a href="paivakirja.html">Päiväkirja</a></li>
        <li><a href="#">Palaute</a></li>
      </ul>
      <a id="logout" href="index.html">Kirjaudu ulos</a>
    </div>

  <div class="lomake">
    <div class="ylärivi">
  <input type="email" id="emailKentta" placeholder="Sähköpostiosoitteesi (vapaaehtoinen)">
  <label class="tiedosto-nappi"> + Lisää tiedosto
    <input type="file" id="tiedostoInput" style="display:none">
  </label>
  </div>
  <div id="tiedostoNimi" style="display:none; font-size:13px; margin-top:-4px">
    <span id="nimiTeksti"></span>
    <span onclick="poistaTiedosto()" style="cursor:pointer; margin-left:8px; color:red">✕</span>
  </div>
    <input type="text" placeholder="Aihe">
    <textarea placeholder="Kuvaus"></textarea>
    <div style="text-align:right">
      <button onclick="laheta()">Lähetä</button>
    </div>
  </div>

  <div class="popup" id="popup" style="display:none">
    <p>Palautteesi on vastaanotettu.</p>
    <button onclick="sulje()">Sulje</button>
  </div>

<script>
  // popup kun lomake lähetetty
  function laheta() {
    document.getElementById('popup').style.display = 'block'
  }
  // sivu refreshaa popupin sulkemisen jälkeen, elikkä lomake tyhjenee
  function sulje() {
    document.getElementById('popup').style.display = 'none'
    location.reload()
  }
  // näyttää tiedoston nimen
  document.getElementById('tiedostoInput').addEventListener('change', function() {
  if (this.files.length > 0) {
    document.getElementById('nimiTeksti').textContent = this.files[0].name
    document.getElementById('tiedostoNimi').style.display = 'block'
  }
})
// poistaa tiedoston ja nimen
function poistaTiedosto() {
  document.getElementById('tiedostoInput').value = ''
  document.getElementById('tiedostoNimi').style.display = 'none'
}

const email = localStorage.getItem('email')
if (email) document.getElementById('emailKentta').value = email

// Hakee käyttäjän nimen joka on local storagessa, jos nimeä ei ole niin ohjelma antaa käyttäjälle nimen "vieras"
// Käyttäjän nimi (joka on vain sähköposti osoite) näytetään sivun oikeassa yläkulmassa
let name = localStorage.getItem('name');
document.querySelector('.username').textContent = name ? name :
'vieras';
</script>
</body>
</html>
