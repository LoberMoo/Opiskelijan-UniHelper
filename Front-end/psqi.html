<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UniHelper</title>

    <link rel="stylesheet" href="src/css/psqi.css">

    <style>
    nav {
        background: black;
        padding: 10px;
        display: flex;
        gap: 15px;
        align-items: center;
        position: fixed;
        top: 0;
        width: 100%;
    }

    nav a {
        color: orange;
        background: whitesmoke;
        padding: 8px 14px;
        border-radius: 5px;
        text-decoration: none;
    }

    .hamburger {
        background: none;
        color: orange;
        font-size: 22px;
        border: none;
        cursor: pointer;
    }

    .kayttajatunnus {
        margin-left: auto;
        color: white;
    }

    .sidebar {
        background: black;
        color: white;
        width: 167px;
        padding: 27px;
        position: fixed;
        top: 48px;
        left: 0;
        height: 100%;
        display: none;
    }

    .sidebar.auki {
        display: block;
    }

    .sidebar ul {
        padding-left: 18px;
    }

    .sidebar li {
        margin: 10px 0;
        cursor: pointer;
    }

    .sidebar a {
        text-decoration: none;
        color: white;
    }

    .window {
        margin-top: 60px;
    }
    </style>
</head>

<body>

<nav>
    <button class="hamburger" onclick="toggleSidebar()">☰</button>

    <div class="kayttajatunnus">Käyttäjä</div>
</nav>

<div class="sidebar" id="sidebar">
  <ul>
    <li><a href="homepage.html">Koti</a></li>
    <li><a href="PSQI.html">PSQI-Kysely</a></li>
    <li><a href="BMI-laskuri.html">Painoindeksi</a></li>
    <li><a href="paivakirja.html">Päiväkirja</a></li>
    <li>Historia</li>
    <li>Palaute</li>
  </ul>
</div>

<div class="window">
    <div class="titlebar">
        PSQI Unenlaatuindeksi
    </div>

    <div class="content">

        <div class="page active" id="page1">
            <h3>Osa 1 / 3 Nukkumistottumukset</h3>
            <p class="subtitle">Vastaa viimeisen kuukauden ajalta.</p>

            <div class="question">
                <label>1. Mihin aikaan menet nukkumaan?</label>
                <input type="time" id="k1" value="22:00">
            </div>

            <div class="question">
                <label>2. Kuinka kauan nukahtamiseen menee (min)?</label>
                <input type="number" id="k2" min="0" max="180" placeholder="esim. 67 min">
            </div>

            <div class="question">
                <label>3. Mihin aikaan heräät?</label>
                <input type="time" id="k3" value="06:07">
            </div>

            <div class="question">
                <label>4. Kuinka monta tuntia nukut yössä?</label>
                <input type="number" id="k4" min="0" max="24" step="0.5" placeholder="esim. 7">
            </div>

            <div class="nav">
                <span>Sivu 1 / 3</span>
                <button class="btn-next" onclick="goTo(2)">Seuraava</button>
            </div>
        </div>

    </div>
</div>
<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("auki");
}
</script>

</body>
</html>
